<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jungle Snake Adventure</title>
    <!-- 어린이 친화적인 귀여운 둥근 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@700;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="ui-layer">
        <div id="start-screen">
            <h1 class="game-title">캐치!<br>스네이크!</h1>
            <input type="text" id="playerNameInput" placeholder="이름입력" maxlength="10" autocomplete="off">
            <div class="button-group">
                <button id="start-btn">시작 [START]</button>
                <button id="record-btn">기록 [RECORD]</button>
            </div>
        </div>

        <div id="record-screen" class="hidden">
            <h1 class="game-title" style="font-size: clamp(30px, 10vw, 50px);">🏆 명예의 전당 🏆</h1>
            <div id="record-list-container">
                <ul id="record-list-main"></ul>
            </div>
            <button id="close-record-btn">닫기 [CLOSE]</button>
        </div>

        <div id="countdown-screen" class="hidden">
            <h1 id="countdown-text">3</h1>
        </div>

        <div id="score-board" class="hidden">
            SCORE <span id="score">0</span>
            <div id="offline-badge" style="display: none;">OFFLINE MODE</div>
        </div>
        <div id="game-over-screen" class="hidden">
            <h1>Oops! Game Over!</h1>
            <p>Your Score: <span id="final-score">0</span></p>
            <div id="ranking-container">
                <h3>🏆 Top 5 Explorers</h3>
                <ul id="ranking-list"></ul>
            </div>
            <button id="restart-btn">Play Again!</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="game.js"></script>
</body>

</html>
