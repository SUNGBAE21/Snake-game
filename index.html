<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jungle Snake Adventure</title>
    <!-- 어린이 친화적인 귀여운 둥근 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer">
        <div id="score-board">
            SCORE <span id="score">0</span>
            <div id="offline-badge" style="display: none;">OFFLINE MODE</div>
        </div>
        <div id="game-over-screen" class="hidden">
            <h1>Oops! Game Over!</h1>
            <p>Your Score: <span id="final-score">0</span></p>
            <div id="ranking-container">
                <h3>🏆 Top 5 Explorers</h3>
                <ul id="ranking-list"></ul>
            </div>
            <button id="restart-btn">Play Again!</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
